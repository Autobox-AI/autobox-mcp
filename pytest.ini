[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add autobox to Python path
pythonpath = .

# Markers for different test types
markers =
    unit: Unit tests
    integration: Integration tests
    docker: Tests requiring Docker
    slow: Slow running tests

# Coverage settings
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Async support
asyncio_mode = auto

# Ignore deprecated warnings from libraries
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning